<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>KSKS-Notes</title>
<link rel="stylesheet" href="style.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e2a38">

<script src="app.js" defer></script>
</head>
<body>

<header>
  <h1>KSKS-Notes</h1>
  <p id="welcome">Hallo!</p>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <ul>
      <li onclick="showSection('dashboard')">Dashboard</li>
      <li onclick="showSection('notizen')">Notizen</li>
      <li onclick="showSection('chat')">Chat</li>
      <li onclick="showSection('videocall')">Videocall</li>
      <li onclick="showSection('premium')">Premium</li>
      <li onclick="showSection('licenses')">E-Lizenzen</li>
      <li onclick="showSection('materials')">Materialien</li>
      <li onclick="showSection('admin')">Admin</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Dashboard -->
    <div id="dashboard">
      <h2>Willkommen!</h2>
      <p>Wähle links eine Funktion aus.</p>
    </div>

    <!-- Notizen -->
    <div id="notizen" style="display:none">
      <h2>Notizen</h2>
      <input type="text" id="folderName" placeholder="Neuer Ordner">
      <button onclick="addFolder()">Ordner erstellen</button>
      <div id="folders"></div>
      <div contenteditable="true" id="noteArea" style="border:1px solid #ccc; padding:10px; margin-top:10px;">
        Hier schreiben...
      </div>
      <button onclick="saveNote()">Notiz speichern</button>
    </div>

    <!-- Chat -->
    <div id="chat" style="display:none">
      <h2>Chat</h2>
      <div id="chatArea" style="border:1px solid #ccc; height:200px; overflow:auto; padding:5px;"></div>
      <input type="text" id="chatMsg" placeholder="Nachricht">
      <button onclick="sendChat()">Senden</button>
    </div>

    <!-- Videocall -->
    <div id="videocall" style="display:none">
      <h2>Videocall</h2>
      <button onclick="startCall()">Start Video</button>
    </div>

    <!-- Premium -->
    <div id="premium" style="display:none">
      <h2>Premium</h2>
      <button onclick="activatePremium()">Premium aktivieren</button>
    </div>

    <!-- E-Lizenzen -->
    <div id="licenses" style="display:none">
      <h2>E-Lizenzen</h2>
      <button onclick="createLicense()">Lizenz erstellen (Admin)</button>
      <div id="licenseList"></div>
    </div>

    <!-- Materialien -->
    <div id="materials" style="display:none">
      <h2>Materialien hochladen</h2>
      <input type="file" id="materialFile">
      <button onclick="uploadMaterial()">Upload</button>
      <div id="materialList"></div>
    </div>

    <!-- Admin -->
    <div id="admin" style="display:none">
      <h2>Admin Bereich</h2>
      <div id="userList"></div>
      <button onclick="loadUsers()">Nutzerverwaltung laden</button>
    </div>

  </div>
</div>

<script>
// --- Supabase Setup ---
const supabaseUrl = "DEINE_SUPABASE_URL";
const supabaseKey = "DEIN_SUPABASE_ANON_KEY";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// --- Auth Check ---
async function checkAuth(){
  const { data: { user } } = await supabase.auth.getUser();
  if(!user) window.location="login.html";
  else document.getElementById("welcome").innerText = "Hallo " + user.email;
}
checkAuth();

// --- Logout ---
async function logout(){
  await supabase.auth.signOut();
  window.location="login.html";
}

// --- Navigation ---
function showSection(id){
  ["dashboard","notizen","chat","videocall","premium","licenses","materials","admin"]
    .forEach(s => document.getElementById(s).style.display="none");
  document.getElementById(id).style.display="block";
}

// --- Notizen & Ordner ---
async function addFolder(){
  const name = document.getElementById("folderName").value;
  if(!name) return;
  const { data: { user } } = await supabase.auth.getUser();
  await supabase.from("folders").insert([{ user_id:user.id, name:name }]);
  loadFolders();
}

async function loadFolders(){
  const { data: { user } } = await supabase.auth.getUser();
  const { data: folders } = await supabase.from("folders").select("*").eq("user_id", user.id);
  const div = document.getElementById("folders");
  div.innerHTML = "";
  folders.forEach(f => { div.innerHTML += "<p>"+f.name+"</p>"; });
}

async function saveNote(){
  const { data: { user } } = await supabase.auth.getUser();
  const content = document.getElementById("noteArea").innerHTML;
  await supabase.from("notes").insert([{ user_id:user.id, content:content }]);
  alert("Notiz gespeichert!");
}

// --- Chat ---
async function sendChat(){
  const { data: { user } } = await supabase.auth.getUser();
  const text = document.getElementById("chatMsg").value;
  if(!text) return;
  await supabase.from("messages").insert([{ user_id:user.id, text:text }]);
  document.getElementById("chatMsg").value="";
}
async function loadChat(){
  supabase.from("messages").on("INSERT", payload=>{
    const chatArea = document.getElementById("chatArea");
    chatArea.innerHTML += payload.new.text + "<br>";
    chatArea.scrollTop = chatArea.scrollHeight;
  }).subscribe();
}
loadChat();

// --- Videocall ---
function startCall(){
  window.open("https://meet.jit.si/"+Math.random().toString(36).substring(2,10), "_blank");
}

// --- Premium ---
async function activatePremium(){
  const { data: { user } } = await supabase.auth.getUser();
  await supabase.from("profiles").update({premium:true}).eq("id", user.id);
  alert("Premium aktiviert!");
}

// --- E-Lizenzen ---
async function createLicense(){
  const title = prompt("Lizenz Titel");
  const { data: { user } } = await supabase.auth.getUser();
  await supabase.from("licenses").insert([{ title:title, owner_id:user.id }]);
  loadLicenses();
}
async function loadLicenses(){
  const { data: { user } } = await supabase.auth.getUser();
  const { data: licenses } = await supabase.from("licenses").select("*").eq("owner_id", user.id);
  const div = document.getElementById("licenseList");
  div.innerHTML="";
  licenses.forEach(l => { div.innerHTML += "<p>"+l.title+"</p>"; });
}
loadLicenses();

// --- Materialien Upload ---
async function uploadMaterial(){
  const file = document.getElementById("materialFile").files[0];
  if(!file) return;
  const { data: { user } } = await supabase.auth.getUser();
  const { data, error } = await supabase.storage.from("materials").upload(user.id+"/"+file.name, file);
  if(error) alert(error.message);
  else loadMaterials();
}
async function loadMaterials(){
  const { data: { user } } = await supabase.auth.getUser();
  const { data: files } = await supabase.storage.from("materials").list(user.id);
  const div = document.getElementById("materialList");
  div.innerHTML="";
  files.forEach(f => { div.innerHTML += "<p>"+f.name+"</p>"; });
}
loadMaterials();

// --- Admin-Bereich ---
async function loadUsers(){
  const { data: users } = await supabase.from("profiles").select("*");
  const div = document.getElementById("userList");
  div.innerHTML="";
  users.forEach(u => { div.innerHTML += "<p>"+u.email+" | "+(u.premium?"Premium":"Free")+" | "+u.role+"</p>"; });
}

// --- PWA Offline Cache ---
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
